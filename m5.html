function startDyn(){stopDyn();if(!WB){WB=document.createElement("div");WB.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none";document.body.prepend(WB)};WB.style.background="transparent";WB.innerHTML="<canvas id=dynC style=\"width:100%;height:100%\"></canvas>";DYN=true;var c=document.getElementById("dynC");if(!c)return;var ctx=c.getContext("2d");var W=c.width=c.offsetWidth,H=c.height=c.offsetHeight;var pts=[];var cnt=Math.min(Math.floor(W*H/8000),120);var cs=[getComputedStyle(document.documentElement).getPropertyValue("--accent").trim()||"#6c5ce7",getComputedStyle(document.documentElement).getPropertyValue("--accent2").trim()||"#00cec9","#a29bfe","#fd79a8","#fdcb6e"];for(var i=0;i<cnt;i++){pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.8,vy:(Math.random()-0.5)*0.8,r:Math.random()*2.5+1})};var hue=0;DYN_INT=setInterval(function(){ctx.clearRect(0,0,W,H);hue+=0.3;for(var i=0;i<cnt;i++){var p=pts[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;var c=document.getElementById("dynC");if(c){var g=c.getContext("2d");g.beginPath();g.arc(p.x,p.y,p.r*3,0,Math.PI*2);var col=cs[i%5];g.fillStyle=col;g.globalAlpha=0.4;g.fill();g.beginPath();g.arc(p.x-p.r*1.5,p.y-p.r*1.5,p.r*0.5,0,Math.PI*2);g.fillStyle="rgba(255,255,255,0.2)";g.fill();for(var j=i+1;j<cnt;j++){var q=pts[j];var dx=p.x-q.x,dy=p.y-q.y;var d=Math.sqrt(dx*dx+dy*dy);if(d<150){g.beginPath();g.moveTo(p.x,p.y);g.lineTo(q.x,q.y);g.strokeStyle=col;g.globalAlpha=(150-d)/600;g.lineWidth=0.6;g.stroke()}}}},30)}
